<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAIN HACKING</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; overflow: hidden; margin: 0; }
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.9); padding: 40px; border: 2px solid #0f0; box-shadow: 0 0 20px #0f0; width: 80%; max-width: 500px; }
        h1 { animation: glitch 1s infinite; text-transform: uppercase; letter-spacing: 5px; }
        .btn { display: inline-block; margin-top: 30px; padding: 15px 30px; background: #0f0; color: #000; text-decoration: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; border: none; }
        .btn:hover { background: #003300; color: #0f0; }
        @keyframes glitch { 0% {text-shadow: 1px 1px #f00;} 50% {text-shadow: -1px -1px #00f;} 100% {text-shadow: 1px -1px #0f0;} }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="box">
        <h1>ZAIN HACKING</h1>
        <p style="color: cyan;">> ACCESSING SECURE TERMINAL...</p>
        <div style="text-align: left; border-top: 1px solid #333; padding-top: 10px; font-size: 0.8rem;">
            > Initializing bypass... [OK]<br>
            > Cracking firewall... [99%]<br>
        </div>
        <a href="shop.html" class="btn">ENTER SYSTEM</a>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const letters = "0123456789ABCDEFHIJKLMNOPQRSTUVWXYZ"; const fontSize = 16;
        const columns = canvas.width / fontSize; const drops = [];
        for (let i = 0; i < columns; i++) drops[i] = 1;
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                ctx.fillText(letters[Math.floor(Math.random()*letters.length)], i*fontSize, drops[i]*fontSize);
                if (drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
